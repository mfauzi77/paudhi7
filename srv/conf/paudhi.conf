<VirtualHost *:80>
    ServerName paudhi.kemenkopmk.go.id
    DocumentRoot /var/www/html

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/paudhi_error.log
    CustomLog ${APACHE_LOG_DIR}/paudhi_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName paudhi.kemenkopmk.go.id
    DocumentRoot /var/www/html
    DirectoryIndex index.html

    # Pastikan direktori dapat dilayani tanpa .htaccess
    <Directory "/var/www/html">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/kemenkopmk/fullchain.pem
    SSLCertificateKeyFile /etc/ssl/kemenkopmk/server.key

    # Security Headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http://localhost:5000; font-src 'self' data:; connect-src 'self' wss: http://localhost:5000 https://localhost:5000; frame-ancestors 'none'; base-uri 'self'"

    # MIME types
    AddType application/javascript .js
    AddType text/css .css
    AddType application/json .json

    # Enable mod_rewrite untuk SPA, tapi jangan rewrite asset/API/uploads/sw.js
    RewriteEngine On

    # Jangan rewrite jika file/direktori memang ada
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    # Kecualikan jalur statis & backend dari fallback ke index.html
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/uploads/
    RewriteCond %{REQUEST_URI} !^/assets/
    RewriteCond %{REQUEST_URI} !^/sw\.js$
    RewriteRule . /index.html [L]

    # Proxy API requests ke Node.js backend
    ProxyPreserveHost On
    ProxyPass        /api/     http://127.0.0.1:5000/api/
    ProxyPassReverse /api/     http://127.0.0.1:5000/api/

    # Proxy uploads ke backend
    ProxyPass        /uploads/ http://127.0.0.1:5000/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:5000/uploads/

    # WebSocket support
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:5000/$1 [P,L]

    # Cache static assets (long-term)
    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
        Header set Cache-Control "public, max-age=31536000"
    </FilesMatch>

    # Service Worker: jangan cache dan izinkan root scope
    <Files "sw.js">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Service-Worker-Allowed "/"
    </Files>

    # Gzip compression
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css application/javascript application/json

    ErrorLog ${APACHE_LOG_DIR}/paudhi_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/paudhi_ssl_access.log combined
</VirtualHost>