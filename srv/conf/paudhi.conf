# Apache2 Virtual Host Configuration for PAUD HI
# File: /etc/apache2/sites-available/paudhi.conf

<VirtualHost *:80>
    ServerName paudhi.kemenkopmk.go.id
    DocumentRoot /var/www/html
    
    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
    
    ErrorLog ${APACHE_LOG_DIR}/paudhi_error.log
    CustomLog ${APACHE_LOG_DIR}/paudhi_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName paudhi.kemenkopmk.go.id
    DocumentRoot /var/www/html
    
    # SSL Configuration (uses server.crt/server.key; chain optional)
    SSLEngine on
    SSLCertificateFile /etc/ssl/kemenkopmk/server.crt
    SSLCertificateKeyFile /etc/ssl/kemenkopmk/server.key
    # SSLCertificateChainFile /etc/ssl/kemenkopmk/server-chain.crt
    
    # Security Headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://generativelanguage.googleapis.com"
    
    # Enable mod_rewrite for React Router
    RewriteEngine On
    
    # Handle React Router - serve index.html for non-file requests
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/uploads/
    RewriteRule . /index.html [L]
    
    # Proxy API requests to Node.js backend
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5000/api/
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/
    
    # Proxy uploads to Node.js backend
    ProxyPass /uploads/ http://127.0.0.1:5000/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:5000/uploads/
    
    # WebSocket support for real-time features
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:5000/$1" [P,L]
    
    # Cache static assets
    <LocationMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
        Header append Cache-Control "public"
    </LocationMatch>
    
    # Gzip compression
    <Location />
        SetOutputFilter DEFLATE
        SetEnvIfNoCase Request_URI \
            \.(?:gif|jpe?g|png)$ no-gzip dont-vary
        SetEnvIfNoCase Request_URI \
            \.(?:exe|t?gz|zip|bz2|sit|rar)$ no-gzip dont-vary
    </Location>
    
    ErrorLog ${APACHE_LOG_DIR}/paudhi_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/paudhi_ssl_access.log combined
</VirtualHost>